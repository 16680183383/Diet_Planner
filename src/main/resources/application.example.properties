spring.application.name=Diet_Planner
server.port=8080
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.neo4j.Neo4jAutoConfiguration,org.springframework.boot.autoconfigure.data.neo4j.Neo4jDataAutoConfiguration,org.springframework.boot.autoconfigure.data.neo4j.Neo4jRepositoriesAutoConfiguration
spring.data.neo4j.repositories.enabled=false

# Neo4j
spring.neo4j.uri=bolt://localhost:7687
spring.neo4j.authentication.username=neo4j
spring.neo4j.authentication.password=YOUR_NEO4J_PASSWORD

# JWT
jwt.secret=YOUR_JWT_SECRET

# Data path
food.data.path=./data/foods

# Scheduler
spring.task.scheduling.pool.size=5

# AI provider
spring.ai.openai.base-url=https://api.example.com
spring.ai.openai.api-key=YOUR_OPENAI_API_KEY
spring.ai.openai.chat.options.model=DeepSeek-V3
spring.ai.openai.chat.options.temperature=0.6
spring.ai.openai.chat.options.top-p=0.8
spring.ai.openai.chat.options.frequency-penalty=1.1
spring.ai.openai.chat.options.max-tokens=1024
spring.ai.openai.chat.options.extra-body.top_k=20
spring.ai.openai.chat.options.headers.X-Failover-Enabled=true

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/diet_planner?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&allowPublicKeyRetrieval=true
spring.datasource.username=YOUR_DB_USERNAME
spring.datasource.password=YOUR_DB_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Training script paths
training.python-command=python
training.conda-env=food_agent
training.metapath2vec.dir=../Metapath2Vec
training.graphsage.dir=../GraphSAGE

# ONNX model path
onnx.model.path=../GraphSAGE/rgcn_inference.onnx

# MCP Neo4j Bridge
app.mcp.neo4j.enabled=true
app.mcp.neo4j.base-url=http://localhost:3001
app.mcp.neo4j.endpoint=/mcp
app.mcp.neo4j.api-key=
app.mcp.neo4j.connect-timeout-ms=3000
app.mcp.neo4j.request-timeout-ms=10000
app.mcp.neo4j.initialization-timeout-ms=10000
app.mcp.neo4j.max-retries=3
app.mcp.neo4j.retry-backoff-ms=300
app.mcp.neo4j.max-concurrency=16
app.mcp.neo4j.tool-cypher-query=neo4j.cypher.query
app.mcp.neo4j.tool-cypher-write=neo4j.cypher.write
app.mcp.neo4j.tool-cypher-transaction=neo4j.cypher.transaction
